name: Build MicroSIP

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: Win32

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2
      with:
        msbuild-architecture: x86

    - name: Install Dependencies
      shell: pwsh
      run: |
        choco install 7zip -y
        choco install innosetup -y

    - name: Setup Directory Structure
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"
        Set-Location ".."

        Write-Host "Setting up directory structure..."

        # Create PJSIP directory structure expected by MicroSIP
        $pjPaths = @(
            "pjlib/include/pj",
            "pjlib/lib",
            "pjsip/include/pjsip",
            "pjsip/lib",
            "pjmedia/include/pjmedia",
            "pjmedia/lib",
            "pjnath/include/pjnath",
            "pjnath/lib",
            "pjlib-util/include/pjlib-util",
            "pjlib-util/lib",
            "third_party/lib",
            "third_party/openssl/Win32/include",
            "third_party/openssl/Win32/lib",
            "third_party/ipp/Win32",
            "third_party/opus/Win32",
            "third_party/silk/Win32/Release",
            "third_party/ffmpeg/Win32",
            "third_party/vpx/Win32",
            "third_party/sdl/Win32",
            "third_party/opencore-amrnb/Win32",
            "third_party/vo-amrwbenc/Win32",
            "third_party/opencore-amrwb/Win32",
            "third_party/hid/Win32",
            "lib"
        )

        foreach ($path in $pjPaths) {
            New-Item -ItemType Directory -Force -Path $path | Out-Null
        }

        Write-Host "Directory structure created"

    - name: Download and Build PJSIP
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"
        Set-Location ".."

        # Check if PJSIP already built
        if (Test-Path "pjproject/lib/pjlib-i386-Win32-vc14-Release.lib") {
            Write-Host "PJSIP already built, skipping..."
            exit 0
        }

        Write-Host "Downloading PJSIP..."

        # Download PJSIP 2.15.1 (matching MicroSIP 3.22.3 requirements)
        $pjsipVersion = "2.15.1"
        $pjsipUrl = "https://github.com/pjsip/pjproject/archive/refs/tags/$pjsipVersion.zip"

        try {
            Invoke-WebRequest -Uri $pjsipUrl -OutFile "pjproject.zip" -TimeoutSec 120
            Expand-Archive -Path "pjproject.zip" -DestinationPath "." -Force

            if (Test-Path "pjproject-$pjsipVersion") {
                Remove-Item -Recurse -Force "pjproject" -ErrorAction SilentlyContinue
                Rename-Item "pjproject-$pjsipVersion" "pjproject" -Force
            }
        } catch {
            Write-Host "Failed to download PJSIP: $_"
            exit 1
        }

        Set-Location "pjproject"

        Write-Host "Configuring PJSIP..."

        # Create config_site.h for MicroSIP
        $configLines = @(
          '/* MicroSIP Configuration for PJSIP */',
          '#ifndef __PJ_CONFIG_SITE_H__',
          '#define __PJ_CONFIG_SITE_H__',
          '',
          '#define PJ_CONFIG_MICROSIP 1',
          '',
          '/* Video support OFF (external ffmpeg/vpx/sdl not available in CI) */',
          '#define PJMEDIA_HAS_VIDEO 0',
          '#define PJMEDIA_HAS_FFMPEG 0',
          '#define PJMEDIA_HAS_VPX 0',
          '',
          '/* Audio codecs: only those bundled with pjproject (external opus/silk/g729 OFF) */',
          '#define PJMEDIA_HAS_OPUS 0',
          '#define PJMEDIA_HAS_SILK 0',
          '#define PJMEDIA_HAS_G729 0',
          '#define PJMEDIA_HAS_G722 1',
          '#define PJMEDIA_HAS_G7221_CODEC 1',
          '#define PJMEDIA_HAS_G726 1',
          '#define PJMEDIA_HAS_GSM 1',
          '#define PJMEDIA_HAS_SPEEX 1',
          '#define PJMEDIA_HAS_ILBC 1',
          '',
          '/* Security */',
          '#define PJMEDIA_HAS_SRTP 1',
          '#define PJMEDIA_HAS_TLS 1',
          '',
          '/* WebRTC audio processing */',
          '#define PJMEDIA_HAS_WEBRTC_AEC 1',
          '#define PJMEDIA_HAS_WEBRTC_VAD 1',
          '',
          '/* Include default config */',
          '#include <pj/config_site_sample.h>',
          '',
          '#endif /* __PJ_CONFIG_SITE_H__ */'
        )
        Set-Content -Path "pjlib/include/pj/config_site.h" -Value $configLines

        Write-Host "Building PJSIP with MSBuild..."

        # Build PJSIP using MSBuild with solution file
        $msbuild = "msbuild"   # from PATH via microsoft/setup-msbuild

        # pjproject 2.15.1 solution is named pjproject-vs14.sln.
        # Build the pjsua_lib target: it pulls in every library dependency
        # (pjlib, pjlib-util, pjnath, pjmedia, pjmedia-codec, pjsip*, third_party)
        # WITHOUT building the sample apps that could otherwise fail the build.
        $sln = Get-ChildItem -Filter "pjproject-vs14.sln" | Select-Object -First 1
        if (-not $sln) { $sln = Get-ChildItem -Filter "*.sln" | Select-Object -First 1 }
        Write-Host "Building solution: $($sln.Name)"
        & $msbuild $sln.FullName /t:pjsua_lib /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0 /m
        if ($LASTEXITCODE -ne 0) {
            Write-Host "pjsua_lib target failed (exit $LASTEXITCODE)"
            exit 1
        }

        Write-Host "PJSIP build completed"

    - name: Copy PJSIP Libraries
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"
        Set-Location ".."

        Write-Host "Staging PJSIP headers + libs where MicroSIP expects them (..\pjX\include, ..\lib)..."

        $src = "pjproject"

        # 1) Copy PJSIP subtrees up one level so ..\pjlib\include, ..\pjsip\include, etc. resolve
        foreach ($d in @("pjlib","pjlib-util","pjnath","pjmedia","pjsip","third_party")) {
            if (Test-Path "$src\$d") {
                Copy-Item "$src\$d" -Destination "." -Recurse -Force
                Write-Host "  staged $d"
            }
        }

        # 2) Gather every built .lib into .\lib
        New-Item -ItemType Directory -Force -Path "lib" | Out-Null
        Get-ChildItem -Path "$src" -Recurse -Filter *.lib -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName -Destination "lib\" -Force -ErrorAction SilentlyContinue
        }

        # 3) Merge all pj + third_party libs into the single combined static lib
        #    that MicroSIP links via #pragma comment(lib, "libpjproject-...-Static.lib")
        $combinedName = "libpjproject-i386-Win32-vc14-Release-Static.lib"
        $vc = (Get-ChildItem "C:\Program Files\Microsoft Visual Studio\2022\*\VC\Tools\MSVC\*\bin\Hostx86\x86\lib.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
        Write-Host "lib.exe: $vc"
        $outLib = Join-Path (Resolve-Path "lib").Path $combinedName
        $inLibs = Get-ChildItem "lib\*.lib" | Where-Object { $_.Name -ne $combinedName } | ForEach-Object { $_.FullName }
        Write-Host "Merging $($inLibs.Count) libs -> $combinedName"
        & $vc /NOLOGO /IGNORE:4006 "/OUT:$outLib" @inLibs
        if (Test-Path $outLib) {
            Write-Host "Combined lib OK: $([math]::Round((Get-Item $outLib).Length/1MB,1)) MB"
        } else {
            Write-Host "ERROR: combined lib was not created"; exit 1
        }

        Write-Host "Libraries in lib/:"
        Get-ChildItem -Path "lib\*.lib" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "  $($_.Name)"
        }

    - name: Build MicroSIP
      working-directory: ${{ github.workspace }}
      shell: pwsh
      run: |
        Write-Host "Building MicroSIP..."

        $msbuild = "msbuild"   # from PATH via microsoft/setup-msbuild

        # Build MicroSIP
        & $msbuild microsip.vcxproj `
            /p:Configuration=${{env.BUILD_CONFIGURATION}} `
            /p:Platform=${{env.BUILD_PLATFORM}} `
            /p:PlatformToolset=v143 `
            /p:WindowsTargetPlatformVersion=10.0 `
            /m

        if ($LASTEXITCODE -ne 0) {
            Write-Host "MicroSIP build failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
        }

        Write-Host "MicroSIP build completed successfully"

    - name: Prepare Output
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"

        # Create output directory
        New-Item -ItemType Directory -Force -Path "output" | Out-Null

        # Copy executable
        if (Test-Path "Release/microsip.exe") {
            Copy-Item "Release/microsip.exe" -Destination "output/" -Force
            Write-Host "Copied microsip.exe"
        } else {
            Write-Host "Warning: microsip.exe not found in Release/"
            Get-ChildItem -Path "Release/" -ErrorAction SilentlyContinue
        }

        # Copy any DLLs
        if (Test-Path "Release/*.dll") {
            Copy-Item "Release/*.dll" -Destination "output/" -Force
            Write-Host "Copied DLLs"
        }

        # List output
        Write-Host "Output directory contents:"
        Get-ChildItem -Path "output" -Recurse | ForEach-Object {
            Write-Host "  $($_.FullName)"
        }

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MicroSIP-Build
        path: ${{ github.workspace }}/output/

    - name: Create Portable ZIP
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"

        if (Test-Path "output/microsip.exe") {
            Compress-Archive -Path "output/*" -DestinationPath "MicroSIP-3.22.3-portable.zip" -Force
            Write-Host "Created portable ZIP archive"
        } else {
            Write-Host "Warning: Cannot create portable ZIP - microsip.exe not found"
        }

    - name: Upload Portable Archive
      uses: actions/upload-artifact@v4
      with:
        name: MicroSIP-Portable
        path: ${{ github.workspace }}/MicroSIP-*.zip

  create-installer:
    needs: build
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: MicroSIP-Build
        path: ${{ github.workspace }}/output/

    - name: Install Inno Setup
      shell: pwsh
      run: |
        choco install innosetup -y

    - name: Create Installer Script
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"

        $installerLines = @(
          '#define MyAppName "MicroSIP"',
          '#define MyAppVersion "3.22.3"',
          '#define MyAppPublisher "MicroSIP"',
          '#define MyAppURL "https://www.microsip.org"',
          '#define MyAppExeName "microsip.exe"',
          '',
          '[Setup]',
          'AppId={{MicroSIP-3.22.3}}',
          'AppName={#MyAppName}',
          'AppVersion={#MyAppVersion}',
          'AppPublisher={#MyAppPublisher}',
          'AppPublisherURL={#MyAppURL}',
          'AppSupportURL={#MyAppURL}',
          'AppUpdatesURL={#MyAppURL}',
          'DefaultDirName={autopf}\{#MyAppName}',
          'DisableProgramGroupPage=yes',
          'LicenseFile=LICENSE',
          'OutputDir=.',
          'OutputBaseFilename=MicroSIP-3.22.3',
          'SetupIconFile=res\microsip.ico',
          'Compression=lzma',
          'SolidCompression=yes',
          'WizardStyle=modern',
          '',
          '[Languages]',
          'Name: "english"; MessagesFile: "compiler:Default.isl"',
          '',
          '[Tasks]',
          'Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked',
          '',
          '[Files]',
          'Source: "output\{#MyAppExeName}"; DestDir: "{app}"; Flags: ignoreversion',
          'Source: "output\*.dll"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs',
          'Source: "LICENSE"; DestDir: "{app}"; Flags: ignoreversion',
          '',
          '[Icons]',
          'Name: "{autoprograms}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"',
          'Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon',
          '',
          '[Run]',
          'Filename: "{app}\{#MyAppExeName}"; Description: "{cm:LaunchProgram,{#StringChange(MyAppName, ''&'', ''&&'')}}"; Flags: nowait postinstall skipifsilent'
        )
        Set-Content -Path "installer.iss" -Value $installerLines

    - name: Build Installer
      shell: pwsh
      run: |
        Set-Location "${{ github.workspace }}"

        $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
        if (Test-Path $isccPath) {
            & $isccPath "installer.iss"
            if ($LASTEXITCODE -eq 0) {
                Write-Host "Installer created successfully"
            } else {
                Write-Host "Installer creation failed with exit code $LASTEXITCODE"
                exit $LASTEXITCODE
            }
        } else {
            Write-Host "Inno Setup compiler not found"
            exit 1
        }

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: MicroSIP-Installer
        path: ${{ github.workspace }}/MicroSIP-3.22.3.exe
